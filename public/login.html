<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMW Reporting Engine — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Barlow:wght@400;500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F7FAF9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      color: #323547;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 24px rgba(50,53,71,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: #28AB83;
      border-radius: 12px;
      margin-bottom: 14px;
    }

    .logo-badge svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #323547;
      line-height: 1.2;
    }

    .logo p {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      color: #28AB83;
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #323547;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d4e8e2;
      border-radius: 8px;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      color: #323547;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #28AB83;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #aab8b4;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #28AB83;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 8px;
    }

    .btn:hover { background: #22976f; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error.visible { display: block; }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #9aada9;
      font-family: 'Barlow', sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-badge">
        <!-- Chart/reporting icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3v18h18M7 16l4-4 4 4 4-7"/>
        </svg>
      </div>
      <h1>MMW Reporting Engine</h1>
      <p>Internal Team Portal</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@medicalmarketingwhiz.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="footer">Medical Marketing Whiz &mdash; Internal Use Only</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Sign in failed.';
          errorMsg.classList.add('visible');
          return;
        }

        window.location.href = '/dashboard';
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
